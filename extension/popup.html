<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Browser Bridge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #252535;
    --text: #e0e0e8;
    --text2: #8888a0;
    --accent: #00d4aa;
    --accent-glow: rgba(0, 212, 170, 0.15);
    --warn: #f59e0b;
    --warn-glow: rgba(245, 158, 11, 0.15);
    --danger: #ef4444;
    --danger-glow: rgba(239, 68, 68, 0.15);
    --blue: #60a5fa;
    --radius: 8px;
    --radius-sm: 5px;
    --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 380px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 12px;
    overflow-x: hidden;
  }

  /* ─── Background texture ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(0,212,170,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(96,165,250,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Header ─── */
  .header {
    position: relative;
    z-index: 1;
    padding: 16px 16px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--accent) 0%, #00a8ff 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #000;
    font-family: var(--font-mono);
  }

  .brand-text h1 {
    font-size: 13px; font-weight: 700; letter-spacing: -0.01em;
    color: var(--text);
  }
  .brand-text span {
    font-size: 10px; color: var(--text2);
    font-family: var(--font-mono);
  }

  .version-tag {
    font-size: 9px; font-family: var(--font-mono);
    color: var(--accent); background: var(--accent-glow);
    padding: 2px 6px; border-radius: 3px;
    letter-spacing: 0.05em;
  }

  /* ─── Status Bar ─── */
  .status-bar {
    position: relative; z-index: 1;
    margin: 12px 16px;
    padding: 12px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }

  .status-indicator {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0; position: relative;
  }
  .status-indicator.on {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent-glow);
  }
  .status-indicator.off {
    background: var(--danger);
    box-shadow: 0 0 8px rgba(239,68,68,.6), 0 0 20px var(--danger-glow);
  }
  .status-indicator.connecting {
    background: var(--warn);
    box-shadow: 0 0 8px rgba(245,158,11,.6);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  .status-info { flex: 1; min-width: 0; }
  .status-label { font-weight: 600; font-size: 12px; }
  .status-label.on { color: var(--accent); }
  .status-label.off { color: var(--danger); }
  .status-label.connecting { color: var(--warn); }

  .status-detail {
    font-size: 10px; color: var(--text2);
    font-family: var(--font-mono);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .uptime {
    font-size: 11px; color: var(--text2);
    font-family: var(--font-mono);
    white-space: nowrap;
  }

  /* ─── Sections ─── */
  .section {
    position: relative; z-index: 1;
    margin: 0 16px 10px;
  }

  .section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text2);
    margin-bottom: 8px;
    font-family: var(--font-mono);
  }

  /* ─── Input Fields ─── */
  .field {
    margin-bottom: 8px;
  }
  .field label {
    display: block; font-size: 10px; font-weight: 500;
    color: var(--text2); margin-bottom: 4px;
  }
  .field-row { display: flex; gap: 6px; }
  .field input {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .field input::placeholder { color: #44445a; }

  /* ─── Buttons ─── */
  .btn-row { display: flex; gap: 6px; margin-top: 10px; }

  .btn {
    flex: 1;
    padding: 8px 0;
    border: none; border-radius: var(--radius-sm);
    font-family: var(--font-sans); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .2s;
    text-align: center;
  }
  .btn-primary {
    background: var(--accent); color: #000;
  }
  .btn-primary:hover { opacity: .85; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--text2); }
  .btn-warn {
    background: transparent; color: var(--warn);
    border: 1px solid rgba(245,158,11,.3);
  }
  .btn-warn:hover { background: var(--warn-glow); }

  /* ─── Log Feed ─── */
  .log-feed {
    max-height: 140px; overflow-y: auto;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px;
    font-family: var(--font-mono); font-size: 10px; line-height: 1.6;
  }
  .log-feed::-webkit-scrollbar { width: 4px; }
  .log-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-line .ts { color: #55556a; margin-right: 6px; }
  .log-line.info  { color: var(--text2); }
  .log-line.ok    { color: var(--accent); }
  .log-line.err   { color: var(--danger); }
  .log-line.cmd   { color: var(--blue); }
  .log-line.empty { color: var(--text2); font-style: italic; }

  /* ─── Toast ─── */
  .toast {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    z-index: 10;
    padding: 6px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
  .toast-ok { background: var(--accent); color: #000; }
  .toast-err { background: var(--danger); color: #fff; }

  /* ─── Footer ─── */
  .footer {
    padding: 8px 16px 12px;
    text-align: center;
  }
  .footer a {
    color: var(--blue); text-decoration: none;
    font-size: 10px; font-family: var(--font-mono);
  }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="header">
  <div class="brand">
    <div class="logo">⎔</div>
    <div class="brand-text">
      <h1>Browser Bridge</h1>
      <span>claude-browser-relay</span>
    </div>
  </div>
  <div class="version-tag" id="versionTag">v2.0</div>
</div>

<div class="status-bar">
  <div class="status-indicator off" id="statusDot"></div>
  <div class="status-info">
    <div class="status-label off" id="statusLabel">DISCONNECTED</div>
    <div class="status-detail" id="statusDetail">—</div>
  </div>
  <div class="uptime" id="uptime"></div>
</div>

<div class="section">
  <div class="section-title">Connection</div>
  <div class="field">
    <label>Server URL</label>
    <div class="field-row">
      <input id="serverUrl" placeholder="ws://127.0.0.1:25818" spellcheck="false">
    </div>
  </div>
  <div class="field">
    <label>Auth Token</label>
    <input id="authToken" type="password" placeholder="your local relay token" spellcheck="false">
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="saveBtn">Save & Connect</button>
    <button class="btn btn-secondary" id="reconnectBtn">Reconnect</button>
  </div>
  <div class="btn-row" style="margin-top:4px">
    <button class="btn btn-warn" id="disconnectBtn" style="flex:0 0 auto; padding: 6px 12px; font-size:10px">Disconnect</button>
  </div>
</div>

<div class="section">
  <div class="section-title" style="display:flex;justify-content:space-between">
    <span>Event Log</span>
    <button id="clearLogBtn" style="background:none;border:none;color:var(--text2);font-family:var(--font-mono);font-size:10px;cursor:pointer;">clear</button>
  </div>
  <div class="log-feed" id="logFeed">
    <div class="log-line empty">Waiting for events...</div>
  </div>
</div>

<div class="footer">
  <a href="https://github.com" target="_blank">docs</a> &nbsp;·&nbsp;
  <a href="#" id="exportLogs">export logs</a>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
